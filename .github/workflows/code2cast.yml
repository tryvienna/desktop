# Auto-generated by Code2Cast GitHub App — https://code2cast.com
# Auth uses GitHub OIDC — no secrets needed in this repo.
name: "Code2Cast — Automated Episodes"

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Days of git history to analyse"
        required: false
        default: "7"
        type: string
      theme:
        description: "Episode theme"
        required: false
        default: casual
        type: choice
        options: ["casual", "technical", "entertaining", "executive"]
      focus:
        description: "Episode focus preset"
        required: false
        default: weekly-update
        type: choice
        options: ["pilot", "weekly-update", "deep-dive", "onboarding", "release-notes", "security-review"]

permissions:
  contents: read
  id-token: write  # required for OIDC token exchange

jobs:
  generate:
    name: "Generate podcast episode"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install code2cast
        run: npm install -g code2cast
      - name: Initialize project
        run: code2cast init --yes --name "$(basename $GITHUB_REPOSITORY)" --json .
      - name: Authenticate with Code2Cast
        id: auth
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://code2cast.com" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to get OIDC token from GitHub"
            exit 1
          fi
          echo "OIDC token obtained (${#OIDC_TOKEN} chars)"

          RESPONSE=$(curl -sS -X POST https://code2cast.com/api/auth/github-oidc \
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            -d "{\"token\": \"$OIDC_TOKEN\"}")
          echo "OIDC exchange response: $RESPONSE"

          C2C_KEY=$(echo "$RESPONSE" | jq -r '.apiKey')

          if [ -z "$C2C_KEY" ] || [ "$C2C_KEY" = "null" ]; then
            echo "::error::OIDC token exchange failed"
            exit 1
          fi

          echo "::add-mask::$C2C_KEY"
          echo "api-key=$C2C_KEY" >> $GITHUB_OUTPUT
      - name: Authenticate CLI
        run: "code2cast auth login --api-key ${{ steps.auth.outputs.api-key }}"
      - name: Generate episode script
        id: generate
        run: |
          code2cast generate \
            --days ${{ github.event.inputs.days || '7' }} \
            --theme ${{ github.event.inputs.theme || 'casual' }} \
            --focus ${{ github.event.inputs.focus || 'weekly-update' }} \
            --duration 1 \
            --provider claude-proxy \
            --yes \
            --json \
            .
      - name: Synthesize audio
        run: code2cast voice --episode 1 --json .
      - name: Publish episode
        run: code2cast publish --episode 1 --podcast vienna --json .
      - name: Upload episode artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "code2cast-episode-${{ github.run_number }}"
          path: .code2cast/output/
          retention-days: 30
