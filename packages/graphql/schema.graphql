  id: ID
  isPinned: Boolean

  """Entities linked to this group (inherited by all workstreams)"""
  linkedEntities: [GroupLinkedEntity!]
  name: String

  """The project this group belongs to"""
  project: Project
  updatedAt: DateTime

  """Non-archived workstreams in this group"""
  workstreams: [Workstream!]
}

"""An entity linked to a workstream as persistent context"""
type WorkstreamLinkedEntity {
  contextOverride: String
  createdAt: DateTime
  entityTitle: String
  entityType: String
  entityUri: String
  isInherited: Boolean
  workstreamId: ID
}

"""An entity reference detected in or added to a workstream conversation"""
type WorkstreamReference {
  entityTitle: String
  entityType: String
  entityUri: String
  externalUrl: String
  firstReferencedAt: DateTime
  workstreamId: ID
}

enum WorkstreamStatus {
  active
  completed_unviewed
  idle
  needs_review
  processing
  waiting_permission
}

"""A tag applied to a workstream with snapshot data and execution status"""
type WorkstreamTag {
  appliedAt: DateTime
  appliedBy: WorkstreamTagAppliedBy
  completedAt: DateTime
  delegatedWorkstreamId: ID
  depth: Int
  error: String
  id: ID
  sourceWorkstreamTagId: ID
  startedAt: DateTime
  status: WorkstreamTagStatus

  """Current tag definition (null if tag was deleted)"""
  tag: Tag
  tagColor: String
  tagDependsOn: [String!]
  tagInstructions: String
  tagMaxDepth: Int
  tagName: String
  tagSpawnWorkstream: Boolean
  tagWorktreeMode: WorktreeMode
  workstreamId: ID
}

enum WorkstreamTagAppliedBy {
  agent
  manual
  pipeline
  trigger
}

enum WorkstreamTagCompletionStatus {
  completed
  failed
}

enum WorkstreamTagStatus {
  completed
  failed
  pending
  running
  skipped
}

enum WorktreeMode {
  fork
  from_main
  same
}

type WorktreeResult {
  branch: String
  directoryPath: String
  error: String
  worktreePath: String
}